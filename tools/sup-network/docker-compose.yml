x-service: &srv
  image: bio-sup-network
  build: .
  volumes:
    - type: bind
      source: ./CTL_SECRET
      target: /bio/sup/default/CTL_SECRET
      read_only: false
    - bio_cache:/bio/cache
    - bio_pkgs:/bio/pkgs
    - type: bind
      source: /bio/sup/default/config/log.yml
      target: /bio/sup/default/config/log.yml
      read_only: false
    # # Mount binaries as executable
    # - type: bind
    #   source: "${PWD}/../../target/debug/bio"
    #   target: /bin/bio
    #   read_only: false
    # - type: bind
    #   source: "${PWD}/../../target/debug/bio-sup"
    #   target: /bin/bio-sup
    #   read_only: false
    # - type: bind
    #   source: "${PWD}/../../target/debug/bio-launch"
    #   target: /bin/bio-launch
    #   read_only: false
  environment:
    RUST_LOG: "info"
    PATH: "/bin:/usr/bin"
    BIO_NONINTERACTIVE: "1"
    BIO_LICENSE: "accept"
    # BIO_SUP_BINARY: "/bin/bio-sup"
    # BIO_LAUNCH_BINARY: "/bin/bio-launch"
  entrypoint: /bin/bio
  deploy:
    resources:
      limits:
        memory: 512M
        cpus: '0.5'

services:
  bastion:
    <<: *srv
    hostname: bastion
    networks:
      sup:
        aliases:
          - bastion
    command:
      - "sup"
      - "run"
      - "--listen-ctl=0.0.0.0:9632"
      - "--permanent-peer"

  rando:
    <<: *srv
    networks:
      sup:
    command:
      - "sup"
      - "run"
      - "--listen-ctl=0.0.0.0:9632"
      - "--peer=bastion"
    depends_on:
      - bastion

networks:
  sup:
    driver: bridge
    name: bio-sup-network

volumes:
  bio_cache:
    name: bio-cache
  bio_pkgs:
    name: bio-pkgs
